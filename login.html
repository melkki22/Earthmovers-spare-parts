<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EarthMovers</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div>📞 +1 (800) 555-0199 &nbsp;&nbsp;|&nbsp;&nbsp; ✉️ support@earthmovers.com</div>
  <div class="top-bar-links">
    <a href="contact.html">Help Center</a>
    <a href="login.html">Sign In</a>
    <a href="register.html">Register</a>
  </div>
</div>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">🚜 <span>EarthMovers</span></div>

  <div class="search-container">
    <form class="search-box-modern" action="products.html" method="GET">
      <span class="search-icon">🔍</span>
      <input type="text" name="q" placeholder="Search by machine, part number, or category..." required>
      <button type="submit">Search</button>
    </form>
  </div>

  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="admin.html">Dashboard</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="menu-toggle" id="mobile-menu">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<div class="nav-bottom-line"></div>

<div class="login-wrapper">
  <div class="login-box">
    <h2>⚙️ EarthMovers</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="loginUser()">Sign In</button>

    <p id="error" style="color:red; display:none;">Invalid login</p>

    <p>Don't have account? <a href="register.html">Create Account</a></p>
  </div>
</div>

<!-- JS -->
<script>
function loginUser() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // SIMPLE DEMO LOGIN
  if (email === "admin@gmail.com" && password === "1234") {
    
    // save login (optional)
    localStorage.setItem("loggedIn", "true");

    // redirect to products page
    window.location.href = "products.html";

  } else {
    document.getElementById("error").style.display = "block";
  }
}
</script>

<!-- FOOTER -->
<footer class="footer">
  <p>&copy; 2026 EarthMovers | All Rights Reserved</p>
</footer>

<script>
  // Mobile Menu Toggle
  const menuToggle = document.getElementById('mobile-menu');
  const navLinks = document.querySelector('.nav-links');

  menuToggle.addEventListener('click', () => {
    navLinks.classList.toggle('active');
  });
</script>
<script src="toast.js"></script>
<script src="auth.js"></script>
</body>
</html>
